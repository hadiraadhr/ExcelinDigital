<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 72" width="200" height="72">
  <!-- square outline -->
  <rect x="2" y="10" width="54" height="54" rx="2" fill="none" stroke="#0D2560" stroke-width="4.5"/>
  <!-- descending staircase bars inside: 3 columns, tallest left, shortest right -->
  <!-- left bar: full height -->
  <rect x="10" y="18" width="12" height="38" fill="#0D2560"/>
  <!-- middle bar: two-thirds height, sits at bottom -->
  <rect x="27" y="31" width="12" height="25" fill="#0D2560"/>
  <!-- right bar: one-third height, sits at bottom -->
  <rect x="44" y="44" width="8"  height="12" fill="#0D2560"/>
  <!-- "SHUAA" bold text -->
  <text x="68" y="58" font-family="'Arial Black',Arial,sans-serif" font-size="36" font-weight="900" letter-spacing="1" fill="#0D2560">SHUAA</text>
</svg>
